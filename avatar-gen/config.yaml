# 아바타 파이프라인 설정 (text → LLM → TTS → lip-sync)

llm:                                        # llm-serve 와 동일한 OpenAI 호환 provider
  base_url: "http://localhost:11434/v1"     # 로컬 Ollama / 클라우드면 vLLM base_url
  api_key: "ollama"
  model: "llama3.2:1b-instruct-q4_K_M"
  max_tokens: 80

tts:                                        # tts-gen 보이스 재사용
  voice_dir: "../tts-gen/models"
  voice: "en_US-lessac-medium"
  use_cuda: false                           # lip-sync CUDA와 분리. onnxruntime-gpu 준비 시에만 true

lipsync:
  backend: "static"      # static(ffmpeg) | wav2lip(외부 모델) | musetalk(외부 모델, 실시간·GPU)
  ffmpeg: "ffmpeg"
  device: "auto"         # auto(cuda→mps→cpu) | cuda | mps | cpu

  # Wav2Lip 사용 시 아래 경로를 주입한다. 환경변수 WAV2LIP_DIR / WAV2LIP_CKPT도 인식한다.
  # wav2lip_dir: "../../_external/Wav2Lip"
  # wav2lip_ckpt: "../../_external/Wav2Lip/checkpoints/wav2lip_gan.pth"

  # Wav2Lip inference 옵션. 얼굴 crop이 어긋나면 pads/nosmooth를 먼저 조정한다.
  pads: [0, 20, 0, 0]
  resize_factor: 1
  nosmooth: false
  # fps: 25
  # gpu_id: 0

  # MuseTalk(실시간 립싱크, GPU 권장) 사용 시 외부 repo/체크포인트 경로를 주입한다.
  # 환경변수 MUSETALK_DIR / MUSETALK_CKPT 도 인식한다.
  # musetalk_dir: "../../_external/MuseTalk"
  # musetalk_ckpt: "../../_external/MuseTalk/models"
  # bbox_shift: 0          # 입 영역 보정(±). 입모양이 어긋나면 먼저 조정.
