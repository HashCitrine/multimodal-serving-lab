# BentoML 빌드 정의 — bentoml build → containerize
service: "bento_service:WhisperSTT"
name: "whisper-stt"
labels:
  owner: multimodal-serving-lab
  modality: stt
include:
  - "bento_service.py"
python:
  requirements_txt: "./requirements.txt"
envs:
  - name: STT_MODEL
    value: "base.en"
  - name: STT_COMPUTE
    value: "int8"
