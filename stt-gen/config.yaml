# faster-whisper STT 설정

model:
  name: "base.en"        # tiny.en | base.en | small.en | medium.en | large-v3
  compute_type: "int8"   # CPU: int8|float32 / GPU(NVIDIA): float16|int8_float16
  device: "auto"         # auto(있으면 cuda) | cpu | cuda  (Apple Silicon은 cpu로 폴백)
  beam_size: 1

audio:
  # 입력 오디오가 없을 때 TTS↔STT 왕복 테스트에 쓰는 Piper 보이스
  tts_voice_dir: "../tts-gen/models"
  tts_voice: "en_US-lessac-medium"

output:
  dir: "./outputs"
